name: Discord Bot CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t anilist-bot-test .

      - name: Smoke Test (Startup Check)
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          docker run -d --name test-container -e DISCORD_TOKEN=$DISCORD_TOKEN anilist-bot-test
          sleep 10
          if [ "$(docker inspect -f '{{.State.Running}}' test-container)" == "true" ]; then
            echo "Bot started successfully!"
            docker stop test-container
          else
            echo "Bot failed to start or crashed!"
            docker logs test-container
            exit 1
          fi